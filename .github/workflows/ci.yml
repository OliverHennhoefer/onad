name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-type-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run python -m ruff check .

      - name: Mypy
        run: >
          uv run python -m mypy
          onad/base/model.py
          onad/base/transformer.py
          onad/base/pipeline.py
          onad/model/threshold.py
          onad/model/quantile_threshold.py
          onad/model/__init__.py
          onad/model/iforest/__init__.py
          onad/model/distance/__init__.py
          onad/model/svm/__init__.py
          onad/model/deep/__init__.py

      - name: Unit tests
        run: uv run python -m pytest tests/models tests/drift tests/transformers -q

  integration-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev --extra eval

      - name: Integration smoke
        run: uv run python -m pytest tests/test_public_imports.py tests/integration -q

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Coverage
        run: uv run python -m pytest tests/models tests/drift tests/transformers --cov=onad --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python
        run: uv python install 3.11

      - name: Build sdist and wheel
        run: uv build
